<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <!-- Background Circle -->
  <circle cx="300" cy="250" r="200" fill="#ecfdf5" opacity="0.6"/>
  <circle cx="300" cy="250" r="160" fill="#d1fae5" opacity="0.4"/>

  <!-- Main Phone/Dashboard Shape -->
  <rect x="200" y="80" width="200" height="340" rx="24" fill="white" stroke="#10b981" stroke-width="2"/>
  <rect x="200" y="80" width="200" height="340" rx="24" fill="url(#phoneGrad)" opacity="0.05"/>

  <!-- Phone Top Notch -->
  <rect x="265" y="92" width="70" height="6" rx="3" fill="#d1d5db"/>

  <!-- Screen Content - Heart Rate Line -->
  <path d="M220 200 L250 200 L260 180 L270 220 L280 190 L290 210 L300 200 L380 200"
        stroke="#10b981" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Mini Card 1 - Pill -->
  <rect x="220" y="120" width="75" height="55" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <ellipse cx="257" cy="140" rx="12" ry="7" fill="#34d399"/>
  <line x1="257" y1="133" x2="257" y2="147" stroke="white" stroke-width="1.5"/>
  <text x="257" y="167" text-anchor="middle" font-size="8" fill="#6b7280" font-family="sans-serif">ilaç</text>

  <!-- Mini Card 2 - Brain -->
  <rect x="305" y="120" width="75" height="55" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <circle cx="342" cy="140" r="10" fill="#60a5fa" opacity="0.3"/>
  <path d="M335 140 C335 134 340 130 345 132 C348 128 355 130 354 136 C358 137 358 143 354 144 C355 148 350 150 346 148 C343 151 336 149 337 144 C333 143 333 137 335 140Z"
        fill="#3b82f6" opacity="0.8"/>
  <text x="342" y="167" text-anchor="middle" font-size="8" fill="#6b7280" font-family="sans-serif">beyin</text>

  <!-- Chart Area -->
  <rect x="220" y="230" width="160" height="80" rx="10" fill="#f9fafb"/>
  <!-- Bar Chart -->
  <rect x="235" y="280" width="14" height="20" rx="3" fill="#6ee7b7"/>
  <rect x="255" y="265" width="14" height="35" rx="3" fill="#34d399"/>
  <rect x="275" y="275" width="14" height="25" rx="3" fill="#6ee7b7"/>
  <rect x="295" y="258" width="14" height="42" rx="3" fill="#10b981"/>
  <rect x="315" y="270" width="14" height="30" rx="3" fill="#34d399"/>
  <rect x="335" y="262" width="14" height="38" rx="3" fill="#6ee7b7"/>
  <rect x="355" y="272" width="14" height="28" rx="3" fill="#34d399"/>

  <!-- Bottom Nav -->
  <rect x="220" y="330" width="160" height="70" rx="0" fill="#f9fafb"/>
  <circle cx="252" cy="360" r="8" fill="#d1fae5"/>
  <circle cx="300" cy="360" r="8" fill="#10b981"/>
  <circle cx="348" cy="360" r="8" fill="#d1fae5"/>
  <rect x="246" y="375" width="12" height="3" rx="1.5" fill="#d1d5db"/>
  <rect x="294" y="375" width="12" height="3" rx="1.5" fill="#10b981"/>
  <rect x="342" y="375" width="12" height="3" rx="1.5" fill="#d1d5db"/>

  <!-- Floating Element - Stethoscope Card (top-left) -->
  <g transform="translate(100, 120)">
    <rect width="80" height="70" rx="16" fill="white" filter="url(#shadow)"/>
    <circle cx="40" cy="28" r="14" fill="#ecfdf5"/>
    <path d="M33 24 C33 20 37 18 40 22 C43 18 47 20 47 24 C47 30 40 35 40 35 C40 35 33 30 33 24Z"
          fill="#10b981"/>
    <text x="40" y="58" text-anchor="middle" font-size="8" fill="#6b7280" font-family="sans-serif">Sağlık</text>
  </g>

  <!-- Floating Element - Calendar Card (bottom-right) -->
  <g transform="translate(420, 300)">
    <rect width="85" height="70" rx="16" fill="white" filter="url(#shadow)"/>
    <rect x="20" y="14" width="45" height="35" rx="6" fill="#f0fdf4" stroke="#bbf7d0"/>
    <rect x="20" y="14" width="45" height="10" rx="6" fill="#10b981"/>
    <circle cx="31" cy="36" r="3" fill="#10b981"/>
    <circle cx="42" cy="36" r="3" fill="#d1d5db"/>
    <circle cx="53" cy="36" r="3" fill="#d1d5db"/>
    <text x="42" y="62" text-anchor="middle" font-size="7" fill="#6b7280" font-family="sans-serif">Takvim</text>
  </g>

  <!-- Floating Element - Check Circle (top-right) -->
  <g transform="translate(430, 100)">
    <rect width="70" height="60" rx="14" fill="white" filter="url(#shadow)"/>
    <circle cx="35" cy="24" r="12" fill="#d1fae5"/>
    <path d="M29 24 L33 28 L41 20" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="35" y="50" text-anchor="middle" font-size="7" fill="#6b7280" font-family="sans-serif">Tamam</text>
  </g>

  <!-- Decorative Dots -->
  <circle cx="130" cy="300" r="4" fill="#6ee7b7" opacity="0.5"/>
  <circle cx="145" cy="320" r="3" fill="#a7f3d0" opacity="0.4"/>
  <circle cx="470" cy="220" r="5" fill="#6ee7b7" opacity="0.4"/>
  <circle cx="490" cy="240" r="3" fill="#a7f3d0" opacity="0.5"/>
  <circle cx="160" cy="180" r="3" fill="#99f6e4" opacity="0.6"/>
  <circle cx="450" cy="380" r="4" fill="#99f6e4" opacity="0.4"/>

  <!-- Small floating crosses -->
  <g transform="translate(480, 160)" opacity="0.3">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g transform="translate(120, 240)" opacity="0.3">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Person silhouette next to phone -->
  <g transform="translate(105, 280)">
    <circle cx="25" cy="10" r="12" fill="#a7f3d0"/>
    <path d="M5 55 C5 35 15 25 25 25 C35 25 45 35 45 55" fill="#6ee7b7" opacity="0.7"/>
  </g>

  <defs>
    <linearGradient id="phoneGrad" x1="200" y1="80" x2="400" y2="420">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>
</svg>