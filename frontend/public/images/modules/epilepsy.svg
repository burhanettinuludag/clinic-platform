<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" fill="url(#epiBg)" rx="0"/>

  <!-- Soft circle decorations -->
  <circle cx="320" cy="80" r="40" fill="#bfdbfe" opacity="0.2"/>
  <circle cx="80" cy="220" r="35" fill="#dbeafe" opacity="0.3"/>

  <!-- Central Brain Shape -->
  <g transform="translate(200, 130)">
    <!-- Brain outline -->
    <path d="M-5 -50 C-30 -50 -50 -35 -50 -15 C-55 -10 -55 5 -45 12 C-50 25 -40 40 -25 42 C-20 50 -10 52 -5 50
             C0 52 10 52 15 50 C20 52 30 50 35 42 C50 40 55 25 50 12 C60 5 60 -10 55 -15 C55 -35 35 -50 10 -50 Z"
          fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5" opacity="0.8"/>
    <!-- Brain fold lines -->
    <path d="M-5 -50 C-5 -25 -5 0 -5 50" stroke="#60a5fa" stroke-width="1" opacity="0.5" fill="none"/>
    <path d="M-35 -20 C-20 -15 -10 -20 -5 -10" stroke="#60a5fa" stroke-width="1" opacity="0.4" fill="none"/>
    <path d="M10 -20 C20 -15 30 -20 40 -10" stroke="#60a5fa" stroke-width="1" opacity="0.4" fill="none"/>
    <path d="M-40 10 C-25 5 -15 15 -5 5" stroke="#60a5fa" stroke-width="1" opacity="0.3" fill="none"/>
    <path d="M5 5 C15 15 25 5 40 10" stroke="#60a5fa" stroke-width="1" opacity="0.3" fill="none"/>

    <!-- Neural Activity Pulses -->
    <circle cx="-25" cy="-20" r="4" fill="#3b82f6" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="-15" r="3" fill="#60a5fa" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-10" cy="15" r="3.5" fill="#3b82f6" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="10" r="3" fill="#93c5fd" opacity="0.6">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- EEG Wave at bottom -->
  <g transform="translate(50, 220)">
    <path d="M0 20 L30 20 L40 5 L50 35 L60 10 L70 30 L80 15 L90 25 L100 20 L130 20 L140 8 L150 32 L160 12 L170 28 L180 18 L190 22 L220 20 L250 20 L260 5 L270 35 L280 15 L290 25 L300 20"
          stroke="#3b82f6" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
    <!-- Baseline -->
    <line x1="0" y1="20" x2="300" y2="20" stroke="#93c5fd" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Shield with Check (protection/monitoring) -->
  <g transform="translate(320, 180)">
    <circle cx="0" cy="0" r="28" fill="white" opacity="0.5"/>
    <path d="M0 -18 L14 -10 L14 2 C14 12 0 20 0 20 C0 20 -14 12 -14 2 L-14 -10 Z"
          fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <path d="M-5 2 L-1 6 L7 -3" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Clipboard/tracking (left) -->
  <g transform="translate(70, 100)">
    <circle cx="0" cy="0" r="25" fill="white" opacity="0.4"/>
    <rect x="-12" y="-16" width="24" height="30" rx="3" fill="white" stroke="#93c5fd" stroke-width="1.2"/>
    <rect x="-6" y="-20" width="12" height="6" rx="2" fill="#3b82f6"/>
    <line x1="-7" y1="-5" x2="7" y2="-5" stroke="#bfdbfe" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-7" y1="1" x2="7" y2="1" stroke="#bfdbfe" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-7" y1="7" x2="3" y2="7" stroke="#bfdbfe" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Sparkle decorations -->
  <g transform="translate(150, 50)" opacity="0.4">
    <path d="M0 -5 L1.5 -1.5 L5 0 L1.5 1.5 L0 5 L-1.5 1.5 L-5 0 L-1.5 -1.5Z" fill="#3b82f6"/>
  </g>
  <g transform="translate(300, 260)" opacity="0.3">
    <path d="M0 -4 L1 -1 L4 0 L1 1 L0 4 L-1 1 L-4 0 L-1 -1Z" fill="#60a5fa"/>
  </g>
  <g transform="translate(50, 160)" opacity="0.3">
    <path d="M0 -3 L1 -1 L3 0 L1 1 L0 3 L-1 1 L-3 0 L-1 -1Z" fill="#93c5fd"/>
  </g>

  <!-- Connection lines (neural network) -->
  <line x1="100" y1="100" x2="155" y2="115" stroke="#93c5fd" stroke-width="0.8" opacity="0.3" stroke-dasharray="3 3"/>
  <line x1="320" y1="180" x2="255" y2="145" stroke="#93c5fd" stroke-width="0.8" opacity="0.3" stroke-dasharray="3 3"/>

  <defs>
    <linearGradient id="epiBg" x1="0" y1="0" x2="400" y2="300">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>
</svg>