<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" fill="url(#parkBg)" rx="0"/>

  <!-- Soft decorative circles -->
  <circle cx="330" cy="70" r="35" fill="#a7f3d0" opacity="0.2"/>
  <circle cx="70" cy="230" r="30" fill="#d1fae5" opacity="0.3"/>

  <!-- Main Person with Supportive Elements -->
  <g transform="translate(200, 130)">
    <!-- Body -->
    <ellipse cx="0" cy="40" rx="30" ry="35" fill="#6ee7b7" opacity="0.6"/>

    <!-- Head -->
    <circle cx="0" cy="-10" r="28" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>

    <!-- Cute face - calm smile -->
    <circle cx="-9" cy="-14" r="3" fill="#92400e"/>
    <circle cx="9" cy="-14" r="3" fill="#92400e"/>
    <!-- Eye shine -->
    <circle cx="-8" cy="-15" r="1" fill="white"/>
    <circle cx="10" cy="-15" r="1" fill="white"/>
    <!-- Smile -->
    <path d="M-8 -2 C-4 4 4 4 8 -2" stroke="#92400e" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- Blush -->
    <ellipse cx="-16" cy="-5" rx="5" ry="3" fill="#fca5a5" opacity="0.3"/>
    <ellipse cx="16" cy="-5" rx="5" ry="3" fill="#fca5a5" opacity="0.3"/>

    <!-- Arms reaching out (exercise/movement) -->
    <!-- Left arm -->
    <path d="M-25 30 C-40 20 -55 25 -60 15" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" fill="none"/>
    <!-- Left hand -->
    <circle cx="-60" cy="15" r="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>

    <!-- Right arm -->
    <path d="M25 30 C40 20 55 25 60 15" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" fill="none"/>
    <!-- Right hand -->
    <circle cx="60" cy="15" r="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>

    <!-- Movement indicators on hands -->
    <g transform="translate(-65, 5)" opacity="0.5">
      <path d="M0 0 C-3 -3 -2 -6 0 -8" stroke="#10b981" stroke-width="1" fill="none"/>
      <path d="M4 0 C1 -3 2 -6 4 -8" stroke="#10b981" stroke-width="1" fill="none"/>
    </g>
    <g transform="translate(60, 5)" opacity="0.5">
      <path d="M0 0 C3 -3 2 -6 0 -8" stroke="#10b981" stroke-width="1" fill="none"/>
      <path d="M-4 0 C-1 -3 -2 -6 -4 -8" stroke="#10b981" stroke-width="1" fill="none"/>
    </g>
  </g>

  <!-- Dumbbell (exercise) - left -->
  <g transform="translate(80, 120)">
    <circle cx="0" cy="0" r="24" fill="white" opacity="0.5"/>
    <rect x="-15" y="-3" width="30" height="6" rx="3" fill="#059669"/>
    <rect x="-18" y="-7" width="8" height="14" rx="3" fill="#10b981"/>
    <rect x="10" y="-7" width="8" height="14" rx="3" fill="#10b981"/>
  </g>

  <!-- Heart rate / health monitor (right) -->
  <g transform="translate(320, 140)">
    <circle cx="0" cy="0" r="26" fill="white" opacity="0.5"/>
    <path d="M-16 0 L-8 0 L-4 -10 L0 8 L4 -6 L8 0 L16 0"
          stroke="#10b981" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Walking path dots at bottom -->
  <g transform="translate(100, 250)" opacity="0.4">
    <circle cx="0" cy="0" r="4" fill="#34d399"/>
    <circle cx="30" cy="-5" r="3.5" fill="#6ee7b7"/>
    <circle cx="60" cy="-2" r="4" fill="#34d399"/>
    <circle cx="90" cy="-6" r="3.5" fill="#6ee7b7"/>
    <circle cx="120" cy="-3" r="4" fill="#34d399"/>
    <circle cx="150" cy="-7" r="3.5" fill="#6ee7b7"/>
    <circle cx="180" cy="-4" r="4" fill="#34d399"/>
    <circle cx="210" cy="-6" r="3.5" fill="#6ee7b7"/>
  </g>

  <!-- Leaf/nature element (wellness) -->
  <g transform="translate(330, 60)" opacity="0.5">
    <path d="M0 15 C-8 10 -15 0 -10 -10 C-5 -20 5 -15 0 -5 C-5 -15 5 -20 10 -10 C15 0 8 10 0 15Z"
          fill="#34d399" opacity="0.7"/>
    <line x1="0" y1="15" x2="0" y2="-5" stroke="#059669" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Stars -->
  <g transform="translate(150, 55)" opacity="0.4">
    <path d="M0 -4 L1 -1 L4 0 L1 1 L0 4 L-1 1 L-4 0 L-1 -1Z" fill="#10b981"/>
  </g>
  <g transform="translate(340, 230)" opacity="0.3">
    <path d="M0 -4 L1 -1 L4 0 L1 1 L0 4 L-1 1 L-4 0 L-1 -1Z" fill="#6ee7b7"/>
  </g>
  <g transform="translate(60, 80)" opacity="0.3">
    <path d="M0 -3 L1 -1 L3 0 L1 1 L0 3 L-1 1 L-3 0 L-1 -1Z" fill="#34d399"/>
  </g>

  <defs>
    <linearGradient id="parkBg" x1="0" y1="0" x2="400" y2="300">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
  </defs>
</svg>