<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" fill="url(#migBg)" rx="0"/>

  <!-- Soft cloud shapes -->
  <ellipse cx="80" cy="240" rx="60" ry="30" fill="white" opacity="0.3"/>
  <ellipse cx="320" cy="60" rx="50" ry="25" fill="white" opacity="0.2"/>

  <!-- Main Head Silhouette -->
  <g transform="translate(200, 140)">
    <!-- Head shape -->
    <ellipse cx="0" cy="-10" rx="55" ry="65" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>

    <!-- Face features - cute style -->
    <!-- Eyes (closed, peaceful) -->
    <path d="M-18 -15 C-14 -20 -8 -20 -4 -15" stroke="#92400e" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M4 -15 C8 -20 14 -20 18 -15" stroke="#92400e" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- Small mouth -->
    <path d="M-6 8 C-2 12 2 12 6 8" stroke="#92400e" stroke-width="1.5" stroke-linecap="round" fill="none"/>

    <!-- Blush -->
    <ellipse cx="-22" cy="-2" rx="7" ry="4" fill="#fca5a5" opacity="0.4"/>
    <ellipse cx="22" cy="-2" rx="7" ry="4" fill="#fca5a5" opacity="0.4"/>

    <!-- Lightning bolts around head (migraine pain) -->
    <g transform="translate(-50, -50)" opacity="0.8">
      <path d="M0 0 L6 10 L2 10 L8 22 L1 12 L5 12 L0 0Z" fill="#f97316" opacity="0.9"/>
    </g>
    <g transform="translate(42, -55)" opacity="0.7">
      <path d="M0 0 L5 8 L2 8 L7 18 L1 10 L4 10 L0 0Z" fill="#f97316" opacity="0.8"/>
    </g>
    <g transform="translate(-60, -20)" opacity="0.6">
      <path d="M0 0 L4 7 L1 7 L5 15 L0 8 L3 8 L0 0Z" fill="#fb923c" opacity="0.7"/>
    </g>

    <!-- Pain waves -->
    <path d="M-70 -40 C-75 -50 -65 -60 -60 -50" stroke="#fdba74" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M-75 -30 C-80 -40 -70 -50 -65 -40" stroke="#fdba74" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M60 -45 C65 -55 55 -65 50 -55" stroke="#fdba74" stroke-width="1.5" fill="none" opacity="0.5"/>
  </g>

  <!-- Soothing hand with medicine -->
  <g transform="translate(310, 170)">
    <circle cx="0" cy="0" r="25" fill="white" opacity="0.6"/>
    <!-- Pill capsule -->
    <rect x="-12" y="-5" width="24" height="10" rx="5" fill="#fb923c"/>
    <rect x="0" y="-5" width="12" height="10" rx="5" fill="#fde68a"/>
  </g>

  <!-- Calming tea cup (left side) -->
  <g transform="translate(80, 180)">
    <circle cx="0" cy="0" r="22" fill="white" opacity="0.5"/>
    <path d="M-10 -5 L-8 10 C-8 14 8 14 8 10 L10 -5 Z" fill="#fed7aa" stroke="#f97316" stroke-width="1"/>
    <path d="M10 -2 C16 -2 16 8 10 8" stroke="#f97316" stroke-width="1" fill="none"/>
    <!-- Steam -->
    <path d="M-3 -10 C-3 -15 0 -15 0 -20" stroke="#fdba74" stroke-width="1" opacity="0.5" fill="none"/>
    <path d="M3 -9 C3 -14 6 -14 6 -19" stroke="#fdba74" stroke-width="1" opacity="0.4" fill="none"/>
  </g>

  <!-- Stars/sparkles -->
  <g transform="translate(130, 60)" opacity="0.5">
    <path d="M0 -5 L1.5 -1.5 L5 0 L1.5 1.5 L0 5 L-1.5 1.5 L-5 0 L-1.5 -1.5Z" fill="#f97316"/>
  </g>
  <g transform="translate(290, 80)" opacity="0.4">
    <path d="M0 -4 L1 -1 L4 0 L1 1 L0 4 L-1 1 L-4 0 L-1 -1Z" fill="#fbbf24"/>
  </g>
  <g transform="translate(340, 240)" opacity="0.3">
    <path d="M0 -4 L1 -1 L4 0 L1 1 L0 4 L-1 1 L-4 0 L-1 -1Z" fill="#fdba74"/>
  </g>

  <!-- Small floating hearts (relief) -->
  <g transform="translate(100, 100)" opacity="0.4">
    <path d="M0 2 C0 0 -3 -2 -3 0 C-3 2 0 4 0 4 C0 4 3 2 3 0 C3 -2 0 0 0 2Z" fill="#f97316"/>
  </g>

  <defs>
    <linearGradient id="migBg" x1="0" y1="0" x2="400" y2="300">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
  </defs>
</svg>