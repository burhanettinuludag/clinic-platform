<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" fill="url(#demBg)" rx="0"/>

  <!-- Soft decorative circles -->
  <circle cx="330" cy="80" r="35" fill="#fbcfe8" opacity="0.2"/>
  <circle cx="70" cy="220" r="30" fill="#fce7f3" opacity="0.3"/>

  <!-- Central Brain with Puzzle Pieces -->
  <g transform="translate(200, 120)">
    <!-- Brain base shape -->
    <ellipse cx="0" cy="0" rx="55" ry="48" fill="#f9a8d4" opacity="0.3"/>

    <!-- Puzzle piece 1 (top-left) -->
    <g transform="translate(-25, -25)">
      <path d="M0 0 L18 0 C18 -5 24 -5 24 0 L40 0 L40 18 C45 18 45 24 40 24 L40 40 L0 40 L0 24 C-5 24 -5 18 0 18 Z"
            fill="#f472b6" opacity="0.7" stroke="#ec4899" stroke-width="0.5"/>
    </path>
    </g>

    <!-- Puzzle piece 2 (top-right) -->
    <g transform="translate(5, -25)">
      <path d="M0 0 L18 0 C18 -5 24 -5 24 0 L40 0 L40 18 C45 18 45 24 40 24 L40 40 L0 40 L0 24 C-5 24 -5 18 0 18 Z"
            fill="#fb7185" opacity="0.6" stroke="#f43f5e" stroke-width="0.5"/>
    </g>

    <!-- Puzzle piece 3 (bottom-left) -->
    <g transform="translate(-25, 5)">
      <path d="M0 0 L18 0 C18 -5 24 -5 24 0 L40 0 L40 18 C45 18 45 24 40 24 L40 40 L0 40 L0 24 C-5 24 -5 18 0 18 Z"
            fill="#c084fc" opacity="0.6" stroke="#a855f7" stroke-width="0.5"/>
    </g>

    <!-- Puzzle piece 4 (bottom-right) - slightly separated -->
    <g transform="translate(10, 10)">
      <path d="M0 0 L18 0 C18 -5 24 -5 24 0 L40 0 L40 18 C45 18 45 24 40 24 L40 40 L0 40 L0 24 C-5 24 -5 18 0 18 Z"
            fill="#e879f9" opacity="0.5" stroke="#d946ef" stroke-width="0.5"/>
    </g>

    <!-- Sparkles on brain (cognitive activity) -->
    <circle cx="-15" cy="-10" r="3" fill="white" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="-5" r="2.5" fill="white" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="5" cy="20" r="2" fill="white" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.1;0.7" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Game Controller / Exercise Element (left) -->
  <g transform="translate(75, 130)">
    <circle cx="0" cy="0" r="28" fill="white" opacity="0.5"/>
    <!-- Book/education icon -->
    <rect x="-14" y="-10" width="12" height="18" rx="2" fill="#f9a8d4" stroke="#ec4899" stroke-width="0.8"/>
    <rect x="0" y="-10" width="12" height="18" rx="2" fill="#fbcfe8" stroke="#ec4899" stroke-width="0.8"/>
    <line x1="-1" y1="-8" x2="-1" y2="6" stroke="#ec4899" stroke-width="0.8"/>
    <!-- Sparkle on book -->
    <g transform="translate(8, -16)" opacity="0.6">
      <path d="M0 -3 L1 -1 L3 0 L1 1 L0 3 L-1 1 L-3 0 L-1 -1Z" fill="#ec4899"/>
    </g>
  </g>

  <!-- Timer/Clock (right) -->
  <g transform="translate(330, 150)">
    <circle cx="0" cy="0" r="26" fill="white" opacity="0.5"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="#ec4899" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="-10" stroke="#ec4899" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="7" y2="3" stroke="#f472b6" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="2" fill="#ec4899"/>
    <!-- Clock top -->
    <rect x="-2" y="-18" width="4" height="3" rx="1" fill="#ec4899"/>
  </g>

  <!-- Memory cards at bottom -->
  <g transform="translate(120, 230)">
    <rect x="0" y="0" width="30" height="35" rx="5" fill="white" stroke="#f9a8d4" stroke-width="1"/>
    <text x="15" y="22" text-anchor="middle" font-size="14">🧠</text>
  </g>
  <g transform="translate(160, 230)">
    <rect x="0" y="0" width="30" height="35" rx="5" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1"/>
    <text x="15" y="22" text-anchor="middle" font-size="10" fill="#ec4899">?</text>
  </g>
  <g transform="translate(200, 230)">
    <rect x="0" y="0" width="30" height="35" rx="5" fill="white" stroke="#f9a8d4" stroke-width="1"/>
    <text x="15" y="22" text-anchor="middle" font-size="14">💡</text>
  </g>
  <g transform="translate(240, 230)">
    <rect x="0" y="0" width="30" height="35" rx="5" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1"/>
    <text x="15" y="22" text-anchor="middle" font-size="10" fill="#ec4899">?</text>
  </g>

  <!-- Hearts (care/support) -->
  <g transform="translate(90, 70)" opacity="0.4">
    <path d="M0 4 C0 2 -4 -1 -4 1 C-4 3 0 6 0 6 C0 6 4 3 4 1 C4 -1 0 2 0 4Z" fill="#ec4899"/>
  </g>
  <g transform="translate(310, 250)" opacity="0.3">
    <path d="M0 3 C0 1.5 -3 -1 -3 1 C-3 2.5 0 5 0 5 C0 5 3 2.5 3 1 C3 -1 0 1.5 0 3Z" fill="#f472b6"/>
  </g>

  <!-- Stars -->
  <g transform="translate(160, 70)" opacity="0.4">
    <path d="M0 -4 L1 -1 L4 0 L1 1 L0 4 L-1 1 L-4 0 L-1 -1Z" fill="#ec4899"/>
  </g>
  <g transform="translate(350, 60)" opacity="0.3">
    <path d="M0 -3 L1 -1 L3 0 L1 1 L0 3 L-1 1 L-3 0 L-1 -1Z" fill="#f9a8d4"/>
  </g>

  <defs>
    <linearGradient id="demBg" x1="0" y1="0" x2="400" y2="300">
      <stop offset="0%" stop-color="#fdf2f8"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
  </defs>
</svg>