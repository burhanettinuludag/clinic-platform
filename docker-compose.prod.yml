# ===========================================
# NOROSERA - Production Docker Compose
# ===========================================
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: norosera_prod
      POSTGRES_USER: norosera
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD environment variable is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U norosera -d norosera_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD environment variable is required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120 --max-requests 300 --max-requests-jitter 50 --access-logfile - --error-logfile -
    deploy:
      resources:
        limits:
          memory: 1G
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - log_files:/var/log/clinic
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; req=urllib.request.Request('http://localhost:8000/api/v1/health/'); req.add_header('X-Forwarded-Proto','https'); urllib.request.urlopen(req, timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://norosera.com/api/v1
        - NEXT_PUBLIC_APP_URL=https://norosera.com
        - NEXT_PUBLIC_APP_NAME=Norosera
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://norosera.com/api/v1
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A config worker -l info --concurrency=2
    volumes:
      - media_files:/app/media
      - log_files:/var/log/clinic
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --timeout 5"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - log_files:/var/log/clinic
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/active.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/backend/staticfiles:ro
      - media_files:/app/backend/media:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal

  certbot:
    image: certbot/certbot
    restart: "no"
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
  log_files:
  certbot_www:
  certbot_conf:

networks:
  internal:
    driver: bridge
