upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=15r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Kötü bot engelleme - genişletilmiş liste
map $http_user_agent $bad_bot {
    default 0;
    # Tarayici/indirici araclar
    ~*(?:httrack|wget|curl|scrapy|python-requests|go-http|java|libwww|lwp|httpie|postman) 1;
    # Guvenlik tarayicilari / saldiri araclari
    ~*(?:nikto|sqlmap|nmap|masscan|zgrab|nuclei|dirbuster|gobuster|wfuzz|ffuf|burpsuite|zap|acunetix|nessus|openvas) 1;
    # SEO botlari (izinsiz tarama)
    ~*(?:ahrefsbot|semrushbot|dotbot|rogerbot|megaindex|majestic|mj12bot|serpstatbot|barkrowler) 1;
    # Scraper/crawler botlari
    ~*(?:dataforseo|blexbot|petalbot|yandexbot|baiduspider|sogou|exabot|ia_archiver) 1;
    # Headless browser / otomasyon
    ~*(?:phantomjs|headlesschrome|selenium|puppeteer|playwright|cypress) 1;
    # Bos user-agent
    "" 1;
}

# Saldiri pattern tespiti - URL'de saldiri izleri
map $request_uri $bad_request {
    default 0;
    ~*(?:\.\./) 1;
    ~*(?:etc/passwd|etc/shadow|proc/self) 1;
    ~*(?:union.*select|insert.*into|delete.*from|drop.*table) 1;
    ~*(?:<script|javascript:|vbscript:|onload=|onerror=) 1;
    ~*(?:\.env|\.git|\.svn|\.hg|\.DS_Store) 1;
    ~*(?:wp-content|wp-includes|wp-json|xmlrpc\.php) 1;
    ~*(?:eval\(|base64_decode|gzinflate|str_rot13) 1;
    ~*(?:phpunit|vendor/phpunit|_profiler|_wdt) 1;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name norosera.com www.norosera.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name norosera.com www.norosera.com;

    # Nginx versiyon bilgisini gizle
    server_tokens off;

    # Kötü botları engelle
    if ($bad_bot) { return 403; }

    # Saldiri pattern'lerini engelle
    if ($bad_request) { return 403; }

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/norosera.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/norosera.com/privkey.pem;

    # SSL settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/x-javascript
               application/xml application/xml+rss image/svg+xml;

    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Hassas dosyalari engelle (.env, .git, wp-admin vb.)
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~* (wp-admin|wp-login|wp-config|xmlrpc|phpmyadmin|\.sql|\.bak) {
        deny all;
        return 404;
    }

    # === GİRİŞ KAPALI - Saldırı koruması ===
    # Django admin tamamen kapalı
    location /yonetim-7x9k/ {
        return 404;
    }

    # Auth endpoint'leri kapalı (login, register, token)
    location /api/v1/auth/ {
        return 403 '{"detail": "Kimlik doğrulama hizmeti geçici olarak kapalıdır."}';
        add_header Content-Type application/json;
    }

    # API -> Django (sadece public endpoint'ler çalışır)
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
        limit_req zone=api burst=15 nodelay;
        limit_conn conn_limit 10;

        # Server bilgilerini gizle
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # Django static files
    location /static/ {
        alias /app/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Django media files - hassas dizinleri koru
    # Doktor dogrulama belgeleri -> sadece auth ile erisim (Django uzerinden)
    location /media/doctor_verification/ {
        deny all;
        return 404;
    }

    # Genel media dosyalari
    location /media/ {
        alias /app/backend/media/;
        expires 7d;
        add_header X-Content-Type-Options "nosniff" always;

        # Sadece izin verilen dosya turleri
        location ~* \.(?:jpe?g|png|gif|webp|svg|pdf)$ {
            alias /app/backend/media/;
            expires 7d;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Calistirilabilir dosyalari engelle
        location ~* \.(?:php|py|sh|bash|exe|bat|cmd|cgi|pl|asp|aspx|jsp|js|html?|htaccess)$ {
            deny all;
            return 404;
        }
    }

    # Hotlink koruması - resimler
    location ~* \.(jpg|jpeg|png|gif|webp|svg)$ {
        valid_referers none blocked norosera.com www.norosera.com;
        if ($invalid_referer) { return 403; }
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Next.js source map'lerini engelle (source code gorunmesin)
    location ~* \.map$ {
        return 404;
    }

    # Frontend -> Next.js
    location / {
        limit_req zone=general burst=30 nodelay;
        limit_conn conn_limit 15;
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server bilgilerini gizle
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # Next.js static
    location /_next/static/ {
        proxy_pass http://frontend;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Health check
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
