upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=5r/s;

# Kötü bot engelleme
map $http_user_agent $bad_bot {
    default 0;
    ~*(?:httrack|wget|curl|scrapy|python-requests|go-http|java|libwww|lwp|nikto|sqlmap|nmap) 1;
    ~*(?:ahrefsbot|semrushbot|dotbot|rogerbot|megaindex|majestic|mj12bot) 1;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name norosera.com www.norosera.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name norosera.com www.norosera.com;

    # Kötü botları engelle
    if ($bad_bot) { return 403; }

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/norosera.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/norosera.com/privkey.pem;

    # SSL settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/x-javascript
               application/xml application/xml+rss image/svg+xml;

    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;

    # Hassas dosyalari engelle (.env, .git, wp-admin vb.)
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~* (wp-admin|wp-login|wp-config|xmlrpc|phpmyadmin|\.sql|\.bak) {
        deny all;
        return 404;
    }

    # API -> Django
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
        limit_req zone=api burst=20 nodelay;
    }

    # Django admin (gizli URL)
    location /yonetim-7x9k/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # Django static files
    location /static/ {
        alias /app/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Django media files
    location /media/ {
        alias /app/backend/media/;
        expires 7d;
    }

    # Hotlink koruması - resimler
    location ~* \.(jpg|jpeg|png|gif|webp|svg)$ {
        valid_referers none blocked norosera.com www.norosera.com;
        if ($invalid_referer) { return 403; }
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend -> Next.js
    location / {
        limit_req zone=general burst=10 nodelay;
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js static
    location /_next/static/ {
        proxy_pass http://frontend;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Health check
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
